# Global name overrides for all resources
nameOverride: ""
fullnameOverride: ""
enablePrometheusStack: true
automountServiceAccountToken: true
globalConfig:
  custom_annotations: {}
  # Prometheus URL the runner queries (e.g. "http://prometheus-server.prometheus.svc:80").
  # Surfaces as PROMETHEUS_URL on the runner pod. Leave empty to let the agent auto-discover.
  prometheus_url: ""
  # Optional headers (comma-separated "Header: value" pairs). Surfaces as PROMETHEUS_HEADERS.
  prometheus_headers: ""
  # Optional labels appended to every PromQL query (legacy multi-cluster parity).
  # A YAML map, e.g. {k8s_cluster: aws-prod}. Surfaces as PROMETHEUS_ADDITIONAL_LABELS
  # in the "key=value,key=value" form the runner expects.
  prometheus_additional_labels: {}
enableServiceMonitors: true
# parameters for the nudgebee forwarder deployment
kubewatch:
  image:
    repository: ghcr.io/nudgebee/kubewatch
    tag: 2.14.1-nb.2
  imagePullPolicy: IfNotPresent
  pprof: true
  resources:
    requests:
      cpu: 10m
      memory: 512Mi
    limits:
      cpu: ~
  additional_env_vars: []
  tolerations: []
  annotations: {}
  nodeSelector: ~
  imagePullSecrets: []
  config:
    namespace: ""
    resource:
      deployment: true
      replicationcontroller: false # 0.10.12 disabled because not supported on the runner
      replicaset: true
      daemonset: true
      statefulset: true
      services: true
      pod: true
      job: true
      node: true
      hpa: true
      clusterrole: true
      clusterrolebinding: true
      serviceaccount: true
      persistentvolume: true
      namespace: true
      configmap: true # 0.9.17
      secret: false # disabled for security reasons
      event: true # updated on kubewatch 2.5
      coreevent: false # added on kubewatch 2.5
      ingress: true # full support on kubewatch 2.4 (earlier versions have ingress bugs)
      rollout: true
# parameters for the nudgebee runner service account
runnerServiceAccount:
  # image pull secrets added to the runner service account. Any pod using the service account will get those
  imagePullSecrets: []
# parameters for the nudgebee runner
runner:
  image:
    repository: ghcr.io/nudgebee/nudgebee-agent
    tag: 2026-07-14T09-20-14_17a3cbad58bd80c14dee85a158cc4ec2de19e09f
  # Image template the pod_profiler action launches debugger pods from.
  # The agent substitutes `{}` for the variant (bpf, jvm, python, perf, ruby).
  # Surfaces as PROFILER_IMAGE; leave empty to fall back to the binary default.
  profilerImage: "ghcr.io/nudgebee/application-profiler-{}:e50de43"
  imagePullPolicy: IfNotPresent
  # Expose net/http/pprof on the runner HTTP listener (surfaces as
  # PPROF_ENABLED). Off by default — the endpoints are unauthenticated;
  # enable only for active memory/CPU debugging.
  pprof: false
  resources:
    requests:
      cpu: 250m
      memory: 1000Mi
    limits:
      cpu: ~
      # Memory limit caps a runaway informer cache on large clusters.
      # 2000Mi is generous headroom for small/medium clusters. SIZING: large
      # clusters need more — budget ~1Gi per ~50k watched objects:
      #   <100 nodes / <10k workloads   : 2000Mi
      #   ~500 nodes / ~50k workloads   : 4000Mi
      #   ~1000 nodes / ~100k workloads : 6000Mi+  (and enable runner.scaling below)
      memory: 2000Mi
  # Liveness/readiness probes hit the always-on /healthz endpoint on :5000 so a
  # hung or restarting runner is detected and kept out of the Service.
  probes:
    enabled: true
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 6
  # Scalability tunables for large clusters. All optional — unset
  # keys fall back to the binary defaults. The wire-changing knobs
  # (snapshotBatching, incrementalBatchSize > 1, emitTombstones) require matching
  # collector support, which has shipped, so they are enabled by default.
  scaling:
    snapshotBatching: true # batch the full-load snapshot (needs collector batch reassembly)
    batchSize: 1000 # items per snapshot batch when snapshotBatching is on
    incrementalBatchSize: 100 # coalesce N informer events per incremental POST (>1 needs collector to iterate data)
    emitTombstones: true # emit deleted:true on delete (needs collector incremental-delete support)
  # forwardPoolSize: 64          # bound concurrent event-forward goroutines
  # relayHandlerPoolSize: 32     # bound concurrent inbound WS handler goroutines
  tolerations: []
  annotations: {}
  nodeSelector: ~
  # Enable write permissions for the runner service account.
  # Adds permissions for: node delete/drain, service management, secret updates,
  # ingress/networkpolicy writes, resource quotas, limit ranges, namespace creation,
  # statefulset scaling, workload creation, and rollout lifecycle management.
  enableWritePermissions: false
  # Read-only cluster access. When true the runner's ClusterRole is strictly
  # get/list/watch — no Secrets API access at all (not even read), no
  # pods/exec, no pod eviction, no node patch, no write verbs on any
  # cluster-scoped or cross-namespace resource. The writes the agent needs to
  # function are granted by a namespaced Role in the RELEASE NAMESPACE only:
  # scanner Jobs, script-runner pods/configmaps, in-namespace exec, and
  # PrometheusRule CRUD (so UI-managed alert rules keep working).
  #
  # What stops working in this mode (denied by the API server): remediation
  # actions on customer workloads (delete_pod, drain, cordon, rollout_restart,
  # scale, PVC ops), rightsizing APPLY (recommendations still compute),
  # exec/profiling/terminal into pods outside the release namespace, and
  # private-image scan pull-secret auto-copy. Helm release inventory is
  # unaffected (the Go runner does not read Helm secrets).
  #
  # Mutually exclusive with enableWritePermissions and
  # scannerAutoCopyPullSecrets — helm template fails if both are set.
  # The full read-only RBAC lives in a single reviewable file:
  # templates/runner-service-account-readonly.yaml.
  readOnly: false
  # Kill-switch for the runner's mutate subsystem (delete_pod, cordon,
  # rollout_restart, PrometheusRule CRUD, AlertManager silences, Loki rules).
  # Default is true so the light-action alert-rule path (driven by the UI)
  # works without extra configuration; the auth boundary lives in the runner,
  # not here. Set to false for a strictly read-only deployment where every
  # mutate action — light-action or not — is unregistered at startup.
  mutateEnabled: true
  # Let image scans pull private workload images by copying the scanned pod's
  # imagePullSecrets into the scanner namespace for the duration of the scan
  # Job. Off by default (least privilege): when off, the agent never reads or
  # copies registry credentials, and private-image scans rely on whatever pull
  # secrets the runner service account already carries
  # (runnerServiceAccount.imagePullSecrets). Enabling this also grants the
  # runner secret update/patch/delete in the release namespace (for GC of the
  # copies) — see runner-service-account.yaml.
  scannerAutoCopyPullSecrets: false
  customClusterRoleRules: []
  imagePullSecrets: []
  extraVolumes: []
  extraVolumeMounts: []
  relay_address: wss://relay.nudgebee.com/register
  clickhouse_enabled: true
  clickhouse_secret: ""
  prometheus:
    # Managed-provider auth for Prometheus-compatible backends. Leave empty
    # for in-cluster Prometheus / plain-header auth (use globalConfig.
    # prometheus_headers for a static Authorization header). Precedence:
    # AWS → Coralogix → Azure.
    auth:
      # Coralogix: surfaces as CORALOGIX_PROMETHEUS_TOKEN (sent as `token` header).
      coralogixToken: ""
      # AWS SigV4 (Amazon Managed Prometheus). accessKey+secretAccessKey required
      # together; serviceName defaults to "aps".
      awsAccessKey: ""
      awsSecretAccessKey: ""
      awsRegion: ""
      awsServiceName: ""
      # Azure AD (Azure Monitor managed Prometheus). Set azureUseManagedId
      # (any non-empty value) OR azureClientSecret; clientId + tenantId required.
      azureUseManagedId: ""
      azureClientId: ""
      azureClientSecret: ""
      azureTenantId: ""
      azureResource: ""
  loki:
    url: ""
    headers: ""
    # Optional HTTP Basic-Auth. Surfaces as LOKI_USERNAME / LOKI_PASSWORD.
    username: ""
    password: ""
  es:
    # ES as the logs provider is OPT-IN: set enabled: true AND url. Defaults off
    # (matching the prod chart) so a stray/leftover `url` never auto-selects ES
    # and masks an explicitly-configured provider like SigNoz. Surfaces as
    # ELASTICSEARCH_ENABLED / ELASTICSEARCH_URL.
    enabled: false
    url: ""
    apiKey: ""
    # Verify the ES server's TLS certificate (https URLs only). Defaults off to
    # match the legacy client. Surfaces as ELASTICSEARCH_SSL_VERIFY.
    sslVerify: false
  signoz:
    # Set to enable SigNoz actions. Surfaces as SIGNOZ_URL.
    url: ""
    # Auth: either apiKey (SIGNOZ-API-KEY header) or user/password
    # (JWT via /api/v1/login). apiKey takes precedence when both are set.
    apiKey: ""
    user: ""
    password: ""
  jaeger:
    # In-cluster Jaeger query endpoint. Set when the account uses
    # traces=jaeger-via-agent so the agent can serve jaeger_query_* actions the
    # backend dispatches. Surfaces as JAEGER_QUERY_URL (the agent falls back to
    # it for JAEGER_URL). When empty, jaeger_query_* return a clear
    # "not configured" error instead of failing auth.
    queryUrl: ""
    # Optional Bearer token for the Jaeger query API. Surfaces as JAEGER_TOKEN.
    token: ""
  chronosphere:
    # Chronosphere endpoint for trace queries. Surfaces as CHRONOSPHERE_URL.
    # Empty → chronosphere_query_traces returns "not configured".
    url: ""
    apiKey: ""
    # Report Chronosphere as the traces provider (surfaces as
    # CHRONOSPHERE_TRACES_ENABLED). Defaults on when `url` is set, so
    # configuring the block "just works" for the Traces status; set false to
    # keep the query action but not surface Chronosphere traces.
    tracesEnabled: true
    # Optional explicit traces URL (CHRONOSPHERE_TRACES_URL). When empty the
    # agent falls back to prometheus_url if it points at chronosphere.io.
    tracesUrl: ""
  pinot:
    # Apache Pinot broker endpoint. Surfaces as PINOT_URL. Empty →
    # pinot_* actions return "not configured".
    url: ""
    authToken: ""
    username: ""
    password: ""
  grafana:
    url: ""
    username: ""
    password: ""
    extra_headers: ""
  additional_env_vars:
    - name: CLICKHOUSE_PORT
      value: "8123"
    - name: CLICKHOUSE_USER
      value: default
    - name: CLICKHOUSE_DB
      value: default
  nudgebee:
    endpoint: https://collector.nudgebee.com
    auth_secret_key: ""
    # Relay Ed25519 public key. Lets the agent verify relay-signed requests and
    # authorize UI-triggered workload mutations (delete/create/replace/restart/
    # scale). The UI install command populates this from the server's
    # SIGNING_PUBLIC_KEY. Empty = relay signatures ignored (mutations stay 401).
    relay_signing_public_key: ''
  serviceAccount:
    annotations: {}
nodeAgent:
  enabled: true
  podmonitor:
    enabled: true
    azuremanaged: false
  service:
    enabled: false
    annotations: {}
    labels: {}
  podAnnotations: {}
  image:
    repository: ghcr.io/nudgebee/node-agent
    pullPolicy: IfNotPresent
    tag: 0.1.3
  resources:
    requests:
      cpu: "100m"
      memory: "500Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  priorityClassName: ""
  logsEndpoint: ""
  profilesEndpoint: ""
  tracesEndpoint: "" # Will be set dynamically based on name overrides
  env:
    - name: SENSITIVE_HEADERS
      value: "Authorization,Proxy-Authorization,Cookie,Set-Cookie,X-Auth-Token,X-CSRF-Token,X-Session-ID,X-JWT-Token,X-Api-Key,X-Api-Token,X-Access-Token,X-Secret-Token,X-Refresh-Token,X-User-Token,X-Firebase-Auth,X-Google-Auth,X-Authorization,X-Wsse,X-WebService-Token,Authentication,Proxy-Authentication,X-Authentication-Token,X-Device-ID,X-Device-Token,X-Device-Key"
# OpenCost is disabled by default: cost is computed centrally on the server side.
# With opencost.enabled=false the agent ships no in-cluster OpenCost AND the runner
# stops discovering/polling cost (see OPENCOST_ENABLED), so the server detects cost
# is off and computes this cluster's allocations centrally (reaching its Prometheus
# via the relay). To run OpenCost per-cluster in the agent, set
# `--set opencost.enabled=true`.
opencost:
  enabled: false
  nameOverride: ""
  fullnameOverride: ""
  opencost:
    exporter:
      image:
        registry: ghcr.io
        repository: nudgebee/opencost
        tag: 1.114.0
    prometheus:
      external:
        url: ""
        enabled: true
      internal:
        enabled: false
      serviceMonitor:
        enabled: true
      defaultRules:
        create: true
    service:
      labels:
        app: opencost
    ui:
      enabled: false
rsa: ~
# custom parameters for OpenShift clusters
openshift:
  enabled: false
  createScc: true
  createPrivilegedScc: false
  privilegedSccName: null
  sccName: null
  sccPriority: null
  privilegedSccPriority: null
opentelemetry-collector:
  enabled: true
  image:
    repository: ghcr.io/nudgebee/opentelemetry-collector-contrib
    tag: 0.75.0
  # Inherit name overrides from parent chart
  nameOverride: ""
  fullnameOverride: ""
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 512Mi
  mode: deployment
  extraEnvs:
    - name: CLICKHOUSE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "nudgebee-agent-clickhouse" # Default name, can be overridden
          key: admin-password
  ports:
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false
  config:
    processors:
      probabilistic_sampler:
        sampling_percentage: 10
      filter/drop_namespaces:
        error_mode: ignore
        traces:
          span:
            - attributes["k8s.namespace.name"] == "kube-system"
      filter/drop_health_check:
        error_mode: ignore
        traces:
          span:
            - attributes["http.route"] == "/health"
            - attributes["http.route"] == "/healthz"
            - attributes["http.route"] == "/live"
            - attributes["http.route"] == "/ready"
            - attributes["http.route"] == "/metrics"
            - attributes["http.target"] == "/health"
            - attributes["http.target"] == "/healthz"
            - attributes["http.target"] == "/live"
            - attributes["http.target"] == "/ready"
            - attributes["http.target"] == "/metrics"
            - attributes["url.path"] == "/health"
            - attributes["url.path"] == "/healthz"
            - attributes["url.path"] == "/live"
            - attributes["url.path"] == "/ready"
            - attributes["url.path"] == "/metrics"
      batch:
        timeout: 5s
        send_batch_size: 25000
    exporters:
      clickhouse:
        endpoint: "tcp://nudgebee-agent-clickhouse:9000?dial_timeout=10s&compress=lz4" # Default endpoint, can be overridden
        database: default
        ttl_days: 7
        username: default
        password: ${env:CLICKHOUSE_PASSWORD}
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        metrics_table_name: otel_metrics
        timeout: 5s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
    service:
      pipelines:
        traces:
          processors: [filter/drop_namespaces, filter/drop_health_check, probabilistic_sampler, batch]
          exporters: [clickhouse]
          receivers: [otlp]
        logs:
          processors: [batch]
          exporters: [clickhouse]
          receivers: [otlp]
        metrics:
          processors: [batch]
          exporters: [clickhouse]
          receivers: [otlp]
clickhouse:
  enabled: true
  image:
    registry: ghcr.io
    repository: nudgebee/clickhouse
    tag: 24.12.4-debian-12-r0-nb-2
  nameOverride: ""
  fullnameOverride: ""
  persistence:
    size: 50Gi
  replicaCount: 1
  shards: 1
  zookeeper:
    enabled: false
  auth:
    username: default
    # Leave empty to let the Bitnami subchart auto-generate a random password
    # on first install (persisted in the `<release>-clickhouse` Secret under
    # key `admin-password`). To pin a value, set it here or pass via
    # `--set clickhouse.auth.password=...`.
    password: ""
  extraOverrides: "<clickhouse>\n  <asynchronous_metric_log remove=\"1\"/>\n  <metric_log remove=\"1\"/>\n  <query_log remove=\"1\" />\n  <query_thread_log remove=\"1\" />  \n  <query_views_log remove=\"1\" />\n  <part_log remove=\"1\"/>\n  <text_log remove=\"1\" />\n  <trace_log remove=\"1\"/>\n  <opentelemetry_span_log remove=\"1\"/>\n</clickhouse>\n"
  resources:
    requests:
      cpu: 100m
      memory: 2000Mi
    limits:
      memory: 2000Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
    prometheusRule:
      enabled: true
      rules:
        - alert: ClickHouseInstanceDown
          expr: up{job="clickhouse"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "ClickHouse instance is down"
            description: "ClickHouse node is not responding for more than 2 minutes."
        - alert: ClickHouseHighLatency
          expr: rate(clickhouse_query_duration_seconds_sum[5m]) / rate(clickhouse_query_duration_seconds_count[5m]) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High query latency detected on ClickHouse"
            description: "Average query duration is above 1 second over last 5 minutes."
alertmanager:
  create_nb_default_rules: true
