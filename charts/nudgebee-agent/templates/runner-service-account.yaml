{{- /*
runner.readOnly renders a strictly read-only ClusterRole: get/list/watch only,
no Secrets API access, no pods/exec, no eviction, no node patch. The writes the
agent needs to function (scanner Jobs, script-runner pods, PrometheusRule CRUD)
are granted by a namespaced Role in the release namespace instead — see the
bottom of this file. Cluster-wide mutations (delete_pod, drain, cordon,
rightsizing applies, ...) are denied by the API server in this mode.
*/}}
{{- if and .Values.runner.readOnly .Values.runner.enableWritePermissions }}
{{- fail "runner.readOnly=true is incompatible with runner.enableWritePermissions=true — choose one" }}
{{- end }}
{{- if and .Values.runner.readOnly .Values.runner.scannerAutoCopyPullSecrets }}
{{- fail "runner.readOnly=true is incompatible with runner.scannerAutoCopyPullSecrets=true — pull-secret auto-copy must read Secrets in workload namespaces" }}
{{- end }}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-cluster-role
  namespace : {{ .Release.Namespace }}
  {{ if .Values.runner.serviceAccount.annotations }}
  annotations:
    {{ toYaml .Values.runner.serviceAccount.annotations | indent 4 }}
  {{- end }}
rules:
  {{- if .Values.runner.customClusterRoleRules }}
{{ toYaml .Values.runner.customClusterRoleRules | indent 2 }}
  {{- end }}
  - apiGroups:
      - ""
    resources:
      - configmaps
      - daemonsets
      - deployments
      - events
      - namespaces
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - pods/status
{{- if not .Values.runner.readOnly }}
      - pods/exec
{{- end }}
      - pods/log
      - replicasets
      - replicationcontrollers
      - services
      - serviceaccounts
      - endpoints
{{- if not .Values.runner.readOnly }}
      - secrets
{{- end }}
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      # cordon/uncordon (spec.unschedulable) — mutate subsystem
      - patch
{{- end }}

{{- if not .Values.runner.readOnly }}
  - apiGroups:
      - ""
    resources:
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - pods/status
      - pods/exec
      - pods/log
      - pods/eviction
      - pods/ephemeralcontainers
    verbs:
      - delete
      - create
      - patch
      - update

  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - list
      - get
{{- end }}

  - apiGroups:
      - "apiregistration.k8s.io"
    resources:
      - apiservices
    verbs:
      - get
      - list

  - apiGroups:
      - "rbac.authorization.k8s.io"
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - "autoscaling"
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      - patch
      - update
{{- end }}

  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - deployments/scale
      - replicasets
      - replicasets/scale
      - statefulsets
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      - patch
      - update
      - delete
      - put
{{- end }}

  - apiGroups:
      - extensions
    resources:
      - daemonsets
      - deployments
      - deployments/scale
      - ingresses
      - replicasets
      - replicasets/scale
      - replicationcontrollers/scale
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      - patch
      - update
{{- end }}

  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      # cluster-wide Job writes; scan Jobs in the release namespace are
      # covered by the readOnly Role below
      - patch
      - delete
      - create
{{- end }}

  - apiGroups:
      - "events.k8s.io"
    resources:
      - events
    verbs:
      - get
      - list

  - apiGroups:
      - networking.k8s.io
    resources:
    - ingresses
    - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling
    resources:
    - horizontalpodautoscalers
    verbs:
      - get
      - list
  - apiGroups:
      - "policy"
    resources:
    - poddisruptionbudgets
    - podsecuritypolicies
    verbs:
      - get
      - list
{{- if not .Values.runner.readOnly }}
      - update
      - patch
{{- end }}
  
  # Resources affected by API deprecations/deletions
  - apiGroups:
      - "scheduling.k8s.io"
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "storage.k8s.io"
    resources:
      - storageclasses
      - volumeattachments
      - csidrivers
      - csinodes
      - csistoragecapacities
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "coordination.k8s.io"
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "discovery.k8s.io"
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "node.k8s.io"
    resources:
      - runtimeclasses
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "admissionregistration.k8s.io"
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
  
  - apiGroups:
      - "flowcontrol.apiserver.k8s.io"
    resources:
      - flowschemas
      - prioritylevelconfigurations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
    - clusterroles
    - clusterrolebindings
    - roles
    - rolebindings
    verbs:
      - get
      - list

  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - "monitoring.coreos.com"
    resources:
      - prometheusrules
    verbs:
      - get
      - list
{{- if not .Values.runner.readOnly }}
      # cluster-wide rule CRUD; under readOnly the alert-rule actions write
      # only in the release namespace via the Role below
      - delete
      - create
      - patch
      - update
{{- end }}
      
  - apiGroups: ["metrics.k8s.io"]
    resources:
    - pods
    - nodes
    verbs:     ["get", "list"]

{{- if .Values.runner.enableWritePermissions }}
  # -- Write permissions (runner.enableWritePermissions) --

  # Node delete - required for node graceful shutdown (kubectl delete node)
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - delete

  # Service lifecycle management
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - create
      - update
      - patch
      - delete

  # Secret update/delete (base already has create/list/get)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - update
      - patch
      - delete

  # Namespace creation
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - create
      - delete

  # Endpoint management
  - apiGroups:
      - ""
    resources:
      - endpoints
    verbs:
      - create
      - update
      - patch
      - delete

  # ServiceAccount management
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - update
      - patch
      - delete

  # ResourceQuotas and LimitRanges
  - apiGroups:
      - ""
    resources:
      - resourcequotas
      - limitranges
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # StatefulSet scale subresource + create for all apps resources
  - apiGroups:
      - apps
    resources:
      - statefulsets/scale
    verbs:
      - get
      - list
      - watch
      - patch
      - update

  # Workload creation (create_workload action)
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - create

  # Ingress write access
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - create
      - update
      - patch
      - delete

  # Extensions ingress write
  - apiGroups:
      - extensions
    resources:
      - ingresses
    verbs:
      - create
      - delete

  # RBAC read for roles/rolebindings (namespace-scoped)
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - create
      - update
      - patch
      - delete
{{- end }}

{{- if (.Capabilities.APIVersions.Has "argoproj.io/v1alpha1/Rollout") }}
  - apiGroups:
    - argoproj.io
    resources:
    - rollouts
    verbs:
    - get
    - list
{{- if not .Values.runner.readOnly }}
    - patch
    - update
{{- end }}
{{- if .Values.runner.enableWritePermissions }}
    - create
    - delete
{{- end }}
{{- end }}

  # Karpenter read permissions are granted unconditionally. An RBAC rule for an
  # absent CRD is inert and becomes active the moment karpenter is installed.
  # This avoids stale RBAC under GitOps/templated installs (where .Capabilities
  # cannot see CRDs) or when karpenter is installed after this chart.
  # Write verbs are gated behind runner.enableWritePermissions.
  - apiGroups:
      - karpenter.sh
    resources:
      - nodepools
      - nodepools/status
      - nodeclaims
      - nodeclaims/status
    verbs:
      - get
      - list
      - watch
{{- if .Values.runner.enableWritePermissions }}
      - create
      - delete
      - patch
      - update
{{- end }}

  - apiGroups:
      - karpenter.k8s.aws
    resources:
      - ec2nodeclasses
    verbs:
      - get
      - list
      - watch
{{- if .Values.runner.enableWritePermissions }}
      - create
      - delete
      - update
      - patch
{{- end }}

  - apiGroups:
      - karpenter.azure.com
    resources:
      - aksnodeclasses
    verbs:
      - get
      - list
      - watch
{{- if .Values.runner.enableWritePermissions }}
      - create
      - delete
      - update
      - patch
{{- end }}

{{- if .Capabilities.APIVersions.Has "snapshot.storage.k8s.io/v1/VolumeSnapshot" }}
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshots
    verbs:
      - get
      - list
      - watch
{{- if not .Values.runner.readOnly }}
      - create
      - update
{{- end }}
{{- end }}

{{- if .Values.openshift.enabled }}
  - apiGroups:
    - security.openshift.io
    resources:
    - securitycontextconstraints
    verbs:
    - use
    resourceNames:
    - {{ if .Values.openshift.createScc }}"{{ include "nudgebee-agent.fullname" . }}-scc"{{ else }}{{ .Values.openshift.sccName | quote }}{{ end }}
  - apiGroups:
    - monitoring.coreos.com
    resources:
    - servicemonitors
    - prometheusrules
    - alertmanagers
    - silences
    - podmonitors
    verbs:
    - get
    - list
    - watch
{{- if not .Values.runner.readOnly }}
    - create
    - update
    - patch
    - delete
    - deletecollection
{{- end }}
{{- if .Values.openshift.createPrivilegedScc }}
    - {{ include "nudgebee-agent.fullname" . }}-scc-privileged
{{- end }}
{{- if .Values.openshift.privilegedSccName }}
    - {{ .Values.openshift.privilegedSccName }}
{{- end }}
{{- end }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-service-account
  namespace: {{ .Release.Namespace }}
{{- if .Values.runnerServiceAccount.imagePullSecrets }}
imagePullSecrets:
{{- toYaml .Values.runnerServiceAccount.imagePullSecrets | nindent 2}}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nudgebee-agent.fullname" . }}-runner-cluster-role
subjects:
  - kind: ServiceAccount
    name: {{ include "nudgebee-agent.fullname" . }}-runner-service-account
    namespace: {{ .Release.Namespace }}
{{- if .Values.runner.readOnly }}
---
# readOnly mode: the writes the agent needs to function stay confined to the
# release namespace. This covers scanner Jobs (schedule_k8s_job & friends,
# SCANNER_NAMESPACE is the release namespace), the pod_script_run_enricher
# script-runner pods + their script ConfigMaps, exec into pods in this
# namespace, and PrometheusRule CRUD for the UI's alert-rule actions (the
# legacy path writes to INSTALLATION_NAMESPACE = release namespace).
# Deliberately NO secrets access: with readOnly the agent has zero Secrets
# API access anywhere, including its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-namespace-writes
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - configmaps
    verbs:
      - create
      - delete
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - patch
      - update
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
    verbs:
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-namespace-writes
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nudgebee-agent.fullname" . }}-runner-namespace-writes
subjects:
  - kind: ServiceAccount
    name: {{ include "nudgebee-agent.fullname" . }}-runner-service-account
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.runner.scannerAutoCopyPullSecrets }}
---
# Auto-copy image-scan pull secrets (runner.scannerAutoCopyPullSecrets).
# The base ClusterRole already grants secrets get/list/watch + create cluster-wide;
# auto-copy additionally needs update/patch/delete to set the GC ownerReference
# on, and clean up, the copies. Those destructive verbs are scoped to THIS
# namespace only (where the copies live), not cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-scanner-pullsecrets
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nudgebee-agent.fullname" . }}-runner-scanner-pullsecrets
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nudgebee-agent.fullname" . }}-runner-scanner-pullsecrets
subjects:
  - kind: ServiceAccount
    name: {{ include "nudgebee-agent.fullname" . }}-runner-service-account
    namespace: {{ .Release.Namespace }}
{{- end }}
