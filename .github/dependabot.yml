version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  # Runner component (Go binary + its Dockerfile)
  - package-ecosystem: docker
    directory: /runner
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker

  - package-ecosystem: gomod
    directory: /runner
    schedule:
      interval: weekly
    labels:
      - dependencies
      - go
