name: Runner - Build Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['runner/**']

permissions:
  contents: read

# Pushes to GHCR (ghcr.io/nudgebee/nudgebee-agent). Multi-arch (amd64+arm64)
# since target nodes can be either. The image name is kept from the former
# nudgebee-agent repo so the chart's update-image-tags workflow picks up new
# tags unchanged. main is the release branch.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag name
        run: echo "tag=$(date +'%Y-%m-%dT%H-%M-%S')_$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: runner
          file: runner/Dockerfile
          push: true
          build-args: |
            VERSION=${{ env.tag }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/nudgebee/nudgebee-agent:${{ env.tag }}
