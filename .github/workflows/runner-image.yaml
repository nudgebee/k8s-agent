name: Runner - Build Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['runner/**']

# Pushes to GHCR (ghcr.io/nudgebee/nudgebee-agent). Multi-arch (amd64+arm64)
# since target nodes can be either. The image name is kept from the former
# nudgebee-agent repo so the chart's update-image-tags workflow picks up new
# tags unchanged. main is the release branch.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag name
        run: echo "tag=$(date +'%Y-%m-%dT%H-%M-%S')_$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build and Push Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          platforms: linux/amd64,linux/arm64
          context: runner
          file: runner/Dockerfile
          push: true
          build-args: |
            VERSION=${{ env.tag }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/nudgebee/nudgebee-agent:${{ env.tag }}
