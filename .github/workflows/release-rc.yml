name: Release RC Charts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-rc:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.10.0

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh

      - name: Generate RC version
        id: rc_version
        run: |
          # Get current version from Chart.yaml
          CURRENT_VERSION=$(yq '.version' charts/nudgebee-agent/Chart.yaml)
          
          # Find existing RC releases for this version
          EXISTING_RCS=$(gh release list --json tagName --jq '.[] | select(.tagName | test("nudgebee-agent-'${CURRENT_VERSION}'-rc-[0-9]+$")) | .tagName' | sed 's/nudgebee-agent-'${CURRENT_VERSION}'-rc-//' | sort -n | tail -1)
          
          if [ -z "$EXISTING_RCS" ]; then
            RC_NUMBER=1
          else
            RC_NUMBER=$((EXISTING_RCS + 1))
          fi
          
          RC_VERSION="${CURRENT_VERSION}-rc-${RC_NUMBER}"
          echo "rc_version=$RC_VERSION" >> $GITHUB_OUTPUT
          echo "Generated RC version: $RC_VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chart version for RC
        run: |
          cd charts/nudgebee-agent
          yq -i ".version=\"${{ steps.rc_version.outputs.rc_version }}\"" Chart.yaml
          yq -i ".appVersion=\"${{ steps.rc_version.outputs.rc_version }}\"" Chart.yaml
    
      - name: Update registries for RC (dev ECR)
        working-directory: ./charts/nudgebee-agent
        run: |
          echo "Updating registries from registry.nudgebee.com to registry.dev.nudgebee.pollux.in for RC release"
          
          # Update all registry.nudgebee.com references to registry.dev.nudgebee.pollux.in
          sed -i 's|registry\.nudgebee\.com|registry.dev.nudgebee.pollux.in|g' values.yaml
          
          echo "Registry update completed"

      - name: Add dependency chart repos
        run: |
          helm repo add opencost https://opencost.github.io/opencost-helm-chart
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add opentelemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

      - name: Run chart-releaser for RC
        uses: helm/chart-releaser-action@v1.4.1
        with:
          charts_dir: charts
          config: .github/configs/cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: "true"

      - name: Mark release as pre-release  
        run: |
          # Wait a moment for release to be fully created
          sleep 5
          
          # Update the release to mark it as pre-release
          echo "Marking nudgebee-agent-${{ steps.rc_version.outputs.rc_version }} as pre-release..."
          gh release edit "nudgebee-agent-${{ steps.rc_version.outputs.rc_version }}" --prerelease
          
          echo "✅ Successfully marked release as pre-release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update RC release with additional notes
        run: |
          # Create enhanced release notes
          cat << 'EOF' > release_notes.md
          ## Release Candidate ${{ steps.rc_version.outputs.rc_version }}
          
          This is a release candidate with the latest features and fixes.
          
          ### Latest Images Used:
          - Built from latest commit: ${{ github.sha }}
          - Generated at: $(date)
          
          ### Installation:
          ```bash
          helm repo add nudgebee https://nudgebee.github.io/k8s-agent
          helm repo update
          helm install nudgebee-agent nudgebee/nudgebee-agent --version ${{ steps.rc_version.outputs.rc_version }}
          ```
          
          ### ⚠️ Pre-release Notice
          This is a release candidate. Use with caution in production environments.
          EOF
          
          # Update both the title and notes (the release was created by chart-releaser-action)
          gh release edit "nudgebee-agent-${{ steps.rc_version.outputs.rc_version }}" \
            --title "Release Candidate ${{ steps.rc_version.outputs.rc_version }}" \
            --notes-file release_notes.md
          
          echo "✅ Updated release title and notes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
