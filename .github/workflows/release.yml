name: Release Charts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      id-token: write # keyless cosign signing of chart packages
      packages: read # read GHCR tags to pin the runner image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.10.0

      - name: Pin runner image to the build in this release's history
        working-directory: ./charts/nudgebee-agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The runner image is tagged "<timestamp>_<commit-sha>" and built only
          # for main commits touching runner/** (runner-image.yaml). Pin the chart
          # to the NEWEST such image whose commit is an ancestor of the release
          # commit, so a released chart can never ship a runner image that
          # predates — or isn't part of — its own code. See release-rc.yml for the
          # off-by-one this fixes (rc-5 shipped a pre-#453 runner).
          picked=""
          while IFS= read -r tag; do
            sha="${tag##*_}"
            if git merge-base --is-ancestor "$sha" HEAD 2>/dev/null; then
              picked="$tag"; break
            fi
          done < <(gh api -H "Accept: application/vnd.github+json" \
            "/orgs/nudgebee/packages/container/nudgebee-agent/versions?per_page=100" \
            --jq '[.[].metadata.container.tags[]] | map(select(test("^[0-9]{4}.*_[0-9a-f]{40}$"))) | sort | reverse | .[]')
          if [ -z "$picked" ]; then
            echo "::error::No nudgebee-agent image found for any commit in this release's history — build/push the runner image first."
            exit 1
          fi
          yq -i ".runner.image.tag=\"$picked\"" values.yaml
          echo "Pinned runner.image.tag=$picked"

      - name: Add dependency chart repos
        run: |
          helm repo add opencost https://opencost.github.io/opencost-helm-chart

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Sign chart packages (cosign keyless)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_YES: "true"
        run: |
          # chart-releaser stages each packaged chart under .cr-release-packages/
          # and names the GitHub release after the tarball (e.g.
          # nudgebee-agent-0.1.1.tgz -> release nudgebee-agent-0.1.1). Sign each
          # blob keyless (Fulcio/Rekor) into a Sigstore bundle (sig + cert +
          # transparency-log entry) so the release carries verifiable
          # provenance. cosign v3 deprecated --output-signature/-certificate in
          # favour of the .sigstore.json bundle (which OpenSSF Scorecard also
          # recognises as a signature).
          shopt -s nullglob
          pkgs=(.cr-release-packages/*.tgz)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No chart packages produced — nothing to sign."
            exit 0
          fi
          for pkg in "${pkgs[@]}"; do
            tag="$(basename "${pkg%.tgz}")"
            echo "Signing $pkg -> release $tag"
            cosign sign-blob --yes \
              --new-bundle-format \
              --bundle "${pkg}.sigstore.json" \
              "$pkg"
            gh release upload "$tag" "${pkg}.sigstore.json" --clobber
          done
